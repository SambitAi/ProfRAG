paths:
  artifacts_root: artifacts

global_index:
  cache_ttl_seconds: 5

summary_watcher:
  scan_interval_seconds: 60
  max_workers: 2

chunking:
  chunk_size: 1200
  chunk_overlap: 50

embeddings:
  model: gemini-embedding-001

chat:
  model: gemini-2.5-flash-lite
  temperature: 0

vector_db:
  backend: chroma
  auto_collection_suffix: false
  collection_name: pdf_rag_chunks_google_native_gemini_embedding_001
  summary_collection_name: pdf_rag_summaries_google_native_gemini_embedding_001
  card_collection_name: pdf_rag_cards_google_native_gemini_embedding_001
  persist_directory: artifacts/chroma_db

retrieval:
  top_k: 4
  expand_parent: true
  media_top_k: 4
  multi_doc_max_docs: 5

extraction:
  tables: true
  images: true

prompt:
  media_instruction: |
    When context includes [Table] or [Image] blocks:
    - Summarise table data in prose, then refer to it as a structured table.
    - Mention images by caption if available.

summarizer:
  model: gemini-2.5-flash-lite
  temperature: 0
  max_parallel_sections: 1
  retry_attempts: 5
  retry_base_seconds: 2.0

metadata_cards:
  first_page_chars: 1200
  section_preview_chars: 600
  include_asset_captions: true
  embed_on_ingest: true
  summary_boost: 0.25
  summary_required_for_routing: false

field_extraction:
  enabled: true
  profiles: {}

